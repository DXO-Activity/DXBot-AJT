<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DXO Guide — DX Journey Chatbot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --wood-deep:#2A180C;
    --wood-mid:#3E2412;
    --leather:#5C3A1E;
    --leather-dark:#3B2414;
    --paper:#F4E8C9;
    --paper-dark:#E8D6A3;
    --paper-shadow:#D8C088;
    --border-gold: rgba(184,134,11,0.55);
    --gold: #A9781F;
    --gold-bright: #C99A2E;
    --gold-glow: rgba(230,178,74,0.55);
    --purple: #4B3B7C;
    --purple-soft: rgba(75,59,124,0.28);
    --ink: #3A2A18;
    --ink-muted: #8A6E48;
    --bubble-bot: rgba(255,251,238,0.65);
    --bubble-user: linear-gradient(135deg, #4B3B7C, #6E4FA0);
    --radius: 16px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Sarabun', sans-serif;
    background:
      radial-gradient(ellipse 500px 400px at 20% 15%, rgba(255,196,110,0.25), transparent 60%),
      radial-gradient(ellipse 600px 500px at 85% 80%, rgba(120,70,30,0.25), transparent 60%),
      linear-gradient(160deg, var(--wood-deep) 0%, var(--wood-mid) 50%, #241408 100%);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 12px;
  }

  .app{
    width:100%;
    max-width:460px;
    height:min(760px, 92vh);
    display:flex;
    flex-direction:column;
    background:
      repeating-linear-gradient(0deg, rgba(150,110,60,0.07) 0px, transparent 2px, transparent 4px),
      radial-gradient(ellipse 260px 180px at 12% 8%, rgba(180,140,80,0.18), transparent 60%),
      radial-gradient(ellipse 220px 160px at 90% 90%, rgba(180,140,80,0.15), transparent 60%),
      radial-gradient(ellipse at 30% 0%, rgba(255,255,255,0.35), transparent 55%),
      linear-gradient(160deg, var(--paper) 0%, var(--paper-dark) 100%);
    border:3px solid var(--leather);
    border-radius:14px;
    overflow:hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.65), 0 0 0 6px rgba(92,58,30,0.25), inset 0 0 40px rgba(184,134,11,0.12);
  }

  /* brass corner ornaments, like the book's metal clasps */
  .app{ position:relative; }
  .app::before, .app::after{
    content:"";
    position:absolute;
    width:22px; height:22px;
    border:2px solid var(--gold-bright);
    pointer-events:none;
    z-index:5;
    opacity:0.85;
  }
  .app::before{ top:6px; left:6px; border-right:none; border-bottom:none; border-radius:4px 0 0 0; }
  .app::after{ bottom:6px; right:6px; border-left:none; border-top:none; border-radius:0 0 4px 0; }

  /* ---------- Header ---------- */
  .header{
    position:relative;
    padding:20px 20px 16px;
    background: linear-gradient(135deg, var(--leather), var(--leather-dark));
    border-bottom:2px solid var(--border-gold);
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
  }
  .header::after{
    content:"";
    position:absolute;
    inset:5px;
    border:1px solid rgba(230,178,74,0.35);
    border-radius:4px;
    pointer-events:none;
  }
  .header-main{
    display:flex;
    align-items:center;
    gap:14px;
    min-width:0;
  }
  .orb{
    position:relative;
    width:46px;height:46px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #8a5a24, #2a1a0c 70%);
    border:1px solid var(--gold);
    display:flex;align-items:center;justify-content:center;
    font-size:22px;
    flex-shrink:0;
    box-shadow: 0 0 18px 4px rgba(255,178,90,0.55);
    animation: pulse 3.2s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ box-shadow: 0 0 12px 2px rgba(255,178,90,0.45); }
    50%{ box-shadow: 0 0 24px 7px rgba(255,178,90,0.7); }
  }
  .header-text{ min-width:0; }
  .header-text .eyebrow{
    font-family:'Cinzel', serif;
    letter-spacing:0.14em;
    font-size:10.5px;
    color:var(--gold-bright);
    text-transform:uppercase;
    margin:0 0 2px;
  }
  .header-text h1{
    margin:0;
    font-size:18px;
    font-weight:700;
    color:#F4E8C9;
    font-family:'Cinzel', serif;
    letter-spacing:0.02em;
  }
  .header-text p{
    margin:2px 0 0;
    font-size:12.5px;
    color:#C9B48A;
  }

  /* ---------- Language switcher ---------- */
  .lang-switch{
    position:relative;
    z-index:6;
    display:flex;
    flex-direction:column;
    gap:4px;
    flex-shrink:0;
    padding-top:1px;
  }
  .lang-btn{
    background:transparent;
    border:1px solid var(--gold);
    color:var(--gold-bright);
    font-family:'Sarabun', sans-serif;
    font-size:10.5px;
    font-weight:600;
    letter-spacing:0.02em;
    padding:3px 8px;
    border-radius:8px;
    cursor:pointer;
    transition: all 0.18s ease;
  }
  .lang-btn:hover{ background:rgba(230,178,74,0.18); }
  .lang-btn.active{
    background:var(--gold-bright);
    color:var(--leather-dark);
    border-color:var(--gold-bright);
  }

  /* ---------- Chat area ---------- */
  .chat{
    flex:1;
    overflow-y:auto;
    padding:18px 16px 8px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .chat::-webkit-scrollbar{width:6px;}
  .chat::-webkit-scrollbar-thumb{background:var(--border-gold); border-radius:10px;}

  .row{ display:flex; width:100%; }
  .row.bot{ justify-content:flex-start; }
  .row.user{ justify-content:flex-end; }

  .bubble{
    max-width:84%;
    padding:12px 14px;
    border-radius:var(--radius);
    font-size:13.6px;
    line-height:1.65;
    white-space:pre-line;
    animation: rise 0.35s ease;
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .row.bot .bubble{
    background:var(--bubble-bot);
    border:1px solid var(--border-gold);
    border-bottom-left-radius:6px;
    color:var(--ink);
    box-shadow: 0 2px 8px rgba(90,60,20,0.12);
  }
  .row.bot .bubble b{ color:var(--gold); }
  .row.user .bubble{
    background:var(--bubble-user);
    border-bottom-right-radius:6px;
    color:#F4E8C9;
    font-weight:500;
    box-shadow: 0 2px 10px rgba(75,59,124,0.35);
  }

  .bot-label{
    font-family:'Cinzel', serif;
    font-size:9.5px;
    letter-spacing:0.12em;
    color:var(--gold);
    margin:0 0 4px 2px;
    text-transform:uppercase;
  }

  /* ---------- Options ---------- */
  .options{
    display:flex;
    flex-direction:column;
    gap:8px;
    padding:2px 2px 4px;
  }
  .opt-btn{
    display:flex;
    align-items:center;
    gap:10px;
    text-align:left;
    background:rgba(255,251,238,0.55);
    border:1px solid var(--border-gold);
    color:var(--ink);
    font-family:'Sarabun', sans-serif;
    font-size:13.4px;
    font-weight:500;
    padding:11px 13px;
    border-radius:14px;
    cursor:pointer;
    transition: all 0.18s ease;
  }
  .opt-btn:hover{
    background:rgba(255,251,238,0.85);
    border-color:var(--gold-bright);
    transform:translateX(2px);
    box-shadow:0 0 14px rgba(184,134,11,0.28);
  }
  .opt-btn .ic{ font-size:17px; flex-shrink:0; }

  /* ---------- Footer nav ---------- */
  .footer-nav{
    display:flex;
    gap:8px;
    padding:12px 16px 16px;
    border-top:2px solid var(--border-gold);
    background: linear-gradient(135deg, var(--leather), var(--leather-dark));
  }
  .nav-btn{
    flex:1;
    background:transparent;
    border:1px solid var(--gold);
    color:var(--gold-bright);
    font-family:'Sarabun', sans-serif;
    font-size:12.6px;
    font-weight:600;
    padding:9px 10px;
    border-radius:12px;
    cursor:pointer;
    transition: all 0.18s ease;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .nav-btn:hover{ background:rgba(230,178,74,0.18); }
  .nav-btn:disabled{ opacity:0.35; cursor:default; }
  .nav-btn:disabled:hover{ background:transparent; }

  @media (max-width:400px){
    .app{ border-radius:0; height:100vh; max-width:100%; }
    body{ padding:0; }
  }
  @media (max-width:340px){
    .header-text h1{ font-size:16px; }
    .header-text p{ font-size:11px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-main">
      <div class="orb">🧙‍♀️</div>
      <div class="header-text">
        <p class="eyebrow" id="eyebrowText">DX Journey</p>

    <div class="lang-switch" id="langSwitch">

      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ja">JA</button>
    </div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="footer-nav">
    <button class="nav-btn" id="backBtn">↩ ย้อนกลับ</button>
    <button class="nav-btn" id="homeBtn">🏠 เมนูหลัก</button>
  </div>
</div>

let history = ["root"];

function applyStaticTexts(){
  const t = TEXTS[lang];
  document.getElementById('eyebrowText').textContent = t.eyebrow;
  document.getElementById('titleText').textContent = t.title;
  document.getElementById('subtitleText').textContent = t.subtitle;
  backBtn.textContent = t.back;
  homeBtn.textContent = t.home;
  document.documentElement.lang = t.htmlLang;
}

function render(nodeKey, userChoiceLabel){
  const node = NODES[nodeKey];

  if(userChoiceLabel){
    const urow = document.createElement('div');
    urow.className = 'row user';
    urow.innerHTML = `<div class="bubble">${userChoiceLabel}</div>`;
    chatEl.appendChild(urow);
  }

  const brow = document.createElement('div');
  brow.className = 'row bot';
  const wrap = document.createElement('div');
  wrap.style.maxWidth = '84%';
  wrap.innerHTML = `<p class="bot-label">${TEXTS[lang].botLabel}</p>`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.style.maxWidth = '100%';
  bubble.textContent = node.bot[lang];
  wrap.appendChild(bubble);
  brow.appendChild(wrap);
  chatEl.appendChild(brow);

  const optWrap = document.createElement('div');
  optWrap.className = 'options';
  node.options.forEach(opt=>{
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.innerHTML = `<span class="ic">${opt.icon}</span><span>${opt.text[lang]}</span>`;
    b.onclick = ()=>{
      // remove existing option buttons so history stays clean
      document.querySelectorAll('.options').forEach(o=>o.remove());
      history.push(opt.to);
      updateNavButtons();
      render(opt.to, opt.text[lang]);
      scrollToBottom();
    };
    optWrap.appendChild(b);
  });
  chatEl.appendChild(optWrap);
  scrollToBottom();
}

function scrollToBottom(){
  requestAnimationFrame(()=>{ chatEl.scrollTop = chatEl.scrollHeight; });
}

function updateNavButtons(){
  backBtn.disabled = history.length <= 1;
  homeBtn.disabled = history[history.length-1] === 'root';
}

backBtn.onclick = ()=>{
  if(history.length <= 1) return;
  history.pop();
  const prev = history[history.length-1];
  chatEl.innerHTML = '';
  render(prev);
  updateNavButtons();
};

homeBtn.onclick = ()=>{
  history = ['root'];
  chatEl.innerHTML = '';
  render('root');
  updateNavButtons();
};

// ---------- Language switcher ----------
document.querySelectorAll('.lang-btn').forEach(btn=>{
  btn.onclick = ()=>{
    if(btn.dataset.lang === lang) return;
    lang = btn.dataset.lang;
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active', b===btn));
    applyStaticTexts();
    history = ['root'];
    chatEl.innerHTML = '';
    render('root');
    updateNavButtons();
  };
});

// init
applyStaticTexts();
render('root');
updateNavButtons();
</script>
